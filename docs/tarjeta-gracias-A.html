<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXKAN - Tarjeta de Agradecimiento</title>
<style>
  @font-face {
    font-family: 'RL AQVA';
    src: url('../AXKAN_SOURCES/RLAQVA.otf') format('opentype');
  }
  @font-face {
    font-family: 'Objektiv';
    src: url('../AXKAN_SOURCES/FONT-OBJEKTIV-VF-BODY.otf') format('opentype');
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  @page { size: 148mm 210mm; margin: 0; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #aaa;
    font-family: 'Objektiv', 'Avenir Next', 'Helvetica Neue', sans-serif;
    color: #000;
  }

  .card {
    width: 148mm;
    height: 210mm;
    background: #fff;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 5mm 7mm 4mm;
    box-shadow: 0 8px 40px rgba(0,0,0,0.15);
  }

  /* ===== TOP: Jaguar + GRACIAS ===== */
  .top {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 5mm;
    padding-bottom: 4mm;
    border-bottom: 0.5mm solid #000;
  }

  .jaguar {
    width: 22mm;
    height: auto;
    flex-shrink: 0;
    filter: grayscale(100%) contrast(1.4);
  }

  .gracias {
    font-family: 'RL AQVA', serif;
    font-size: 16mm;
    letter-spacing: 2px;
    line-height: 1;
    color: #000;
  }

  .message {
    font-size: 3.2mm;
    color: #555;
    line-height: 1.45;
    margin-top: 1mm;
  }

  /* ===== MIDDLE: QR codes ===== */
  .qr-section {
    width: 100%;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3.5mm;
  }

  .scan-badge {
    font-family: 'RL AQVA', serif;
    font-size: 4mm;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    color: #000;
    border: 0.4mm solid #000;
    padding: 2mm 8mm;
    border-radius: 1.5mm;
  }

  .qr-row {
    display: flex;
    gap: 4mm;
    width: 100%;
    align-items: flex-start;
  }

  .qr-block {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2mm;
  }

  .qr-header {
    display: flex;
    align-items: center;
    gap: 2mm;
  }

  .qr-icon { width: 5.5mm; height: 5.5mm; flex-shrink: 0; }

  .qr-title {
    font-family: 'RL AQVA', serif;
    font-size: 4.5mm;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #000;
  }

  .qr-frame {
    width: 56mm;
    height: 56mm;
    border: 0.7mm solid #000;
    border-radius: 2.5mm;
    padding: 2mm;
    background: #fff;
  }
  .qr-frame img {
    width: 100%;
    height: 100%;
    display: block;
  }

  .qr-desc {
    font-family: 'RL AQVA', serif;
    font-size: 3mm;
    font-weight: 700;
    color: #000;
    text-align: center;
    letter-spacing: 0.5px;
  }

  .qr-sub {
    font-size: 2.5mm;
    color: #777;
    text-align: center;
    line-height: 1.4;
  }

  .qr-url {
    font-size: 2.2mm;
    color: #aaa;
    letter-spacing: 0.3px;
  }

  /* Vertical separator */
  .qr-sep {
    width: 0.2mm;
    align-self: stretch;
    background: #ddd;
    margin: 6mm 0;
    flex-shrink: 0;
  }

  /* ===== AXKAN logo ===== */
  .axkan-letters {
    width: 36mm;
    height: auto;
    filter: grayscale(100%) contrast(1.2);
  }

  /* ===== BOTTOM ===== */
  .bottom {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 3.5mm;
    border-top: 0.5mm solid #000;
  }

  .tagline {
    font-family: 'RL AQVA', serif;
    font-size: 2.8mm;
    letter-spacing: 1.5px;
    color: #444;
  }

  .contact {
    font-size: 2.5mm;
    color: #666;
    text-align: right;
    line-height: 1.5;
    letter-spacing: 0.3px;
  }
  .contact strong {
    color: #000;
    font-weight: 700;
  }

  @media print {
    body { background: none; }
    .card { box-shadow: none; }
  }
</style>
</head>
<body>
<div class="card">

  <!-- TOP -->
  <div class="top">
    <img class="jaguar" src="../AXKAN_SOURCES/JAGUAR.png" alt="AXKAN">
    <div>
      <div class="gracias">GRACIAS</div>
      <p class="message">Tu compra lleva el orgullo de Mexico contigo.</p>
    </div>
  </div>

  <!-- QR HERO -->
  <div class="qr-section">
    <div class="scan-badge">Escanea y Conecta</div>

    <div class="qr-row">
      <!-- Catalogo -->
      <div class="qr-block">
        <div class="qr-header">
          <svg class="qr-icon" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="#000" stroke-width="1.8"/>
            <path d="M2 12h20M12 2c3 3.5 3 14.5 0 20M12 2c-3 3.5-3 14.5 0 20" stroke="#000" stroke-width="1.3"/>
          </svg>
          <span class="qr-title">Catalogo</span>
        </div>
        <div class="qr-frame">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=https://axkan.art/productos&color=000000&bgcolor=ffffff&margin=0" alt="QR Catalogo">
        </div>
        <span class="qr-desc">Toda la coleccion</span>
        <span class="qr-sub">Imanes, llaveros,<br>destapadores y mas</span>
        <span class="qr-url">axkan.art/productos</span>
      </div>

      <div class="qr-sep"></div>

      <!-- WhatsApp -->
      <div class="qr-block">
        <div class="qr-header">
          <svg class="qr-icon" viewBox="0 0 24 24" fill="#000">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347zM12.05 21.785h-.009c-1.78 0-3.524-.479-5.048-1.382l-.362-.215-3.755.985 1.003-3.665-.236-.375A9.856 9.856 0 012.16 12.01C2.162 6.565 6.61 2.12 12.06 2.12c2.63 0 5.1 1.025 6.96 2.888a9.8 9.8 0 012.882 6.964c-.003 5.445-4.45 9.888-9.897 9.888l.046-.075zM20.52 3.449C18.24 1.226 15.24 0 12.05 0 5.465 0 .104 5.356.1 11.94c-.001 2.105.55 4.16 1.595 5.974L0 24l6.233-1.636a11.92 11.92 0 005.71 1.454h.005c6.585 0 11.946-5.357 11.95-11.942a11.83 11.83 0 00-3.378-8.427z"/>
          </svg>
          <span class="qr-title">WhatsApp</span>
        </div>
        <div class="qr-frame">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=https://wa.me/525538253251?text=Hola!%20Vi%20sus%20productos%20en%20Mercado%20Libre%20%F0%9F%87%B2%F0%9F%87%BD&color=000000&bgcolor=ffffff&margin=0" alt="QR WhatsApp">
        </div>
        <span class="qr-desc">Escribenos directo</span>
        <span class="qr-sub">Pedidos personalizados<br>y mayoreo</span>
        <span class="qr-url">wa.me/525538253251</span>
      </div>
    </div>

    <img class="axkan-letters" src="../AXKAN_SOURCES/LETTERS.png" alt="AXKAN">
  </div>

  <!-- BOTTOM -->
  <div class="bottom">
    <span class="tagline">Recuerdos Hechos Souvenir</span>
    <span class="contact"><strong>@axkan.mx</strong> &middot; informacion@axkan.art</span>
  </div>

</div>
</body>
</html>
