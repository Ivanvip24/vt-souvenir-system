<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Render 3 — Kawaii Axolotl | AXKAN</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
/* ============================================
   FONT FACES
   ============================================ */
@font-face {
  font-family: 'RL AQVA';
  src: url('../../fonts/rl-aqva-black.otf') format('opentype');
  font-weight: 900;
  font-display: swap;
}

/* ============================================
   CSS CUSTOM PROPERTIES
   ============================================ */
:root {
  /* Body colors */
  --axo-body-main: #ff8fab;
  --axo-body-shadow: #ff6b8a;
  --axo-body-highlight: #ffb3c6;
  --axo-body-deep: #e8637a;
  --axo-belly: #ffe0e6;
  --axo-belly-light: #fff0f3;

  /* Gill colors */
  --axo-gill-base: #ff4d6d;
  --axo-gill-tip: #ff1744;
  --axo-gill-soft: #ff8fab;
  --axo-gill-bright: #ff6090;

  /* Eye colors */
  --axo-iris: #2d1b69;
  --axo-iris-light: #4a2d8f;
  --axo-pupil: #0d0820;
  --axo-eye-white: #ffffff;
  --axo-eye-sparkle: #ffffff;

  /* Blush */
  --axo-blush: #ff6b8a;

  /* Aztec pattern */
  --axo-pattern: rgba(200, 80, 120, 0.12);
  --axo-pattern-strong: rgba(180, 60, 100, 0.18);

  /* Background */
  --bg-top: #f0e6ff;
  --bg-bottom: #e8f4fd;
  --bg-mid: #edeaff;
  --caustic-1: rgba(173, 216, 255, 0.15);
  --caustic-2: rgba(200, 180, 255, 0.12);

  /* AXKAN brand */
  --rosa-mexicano: #e72a88;
  --verde-selva: #8ab73b;
  --naranja-calido: #f39223;
  --turquesa-caribe: #09adc2;
}

/* ============================================
   RESET & BASE
   ============================================ */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  min-height: 100vh;
  overflow-x: hidden;
  font-family: 'DM Sans', sans-serif;
}

body {
  background: linear-gradient(175deg, var(--bg-top) 0%, var(--bg-mid) 40%, var(--bg-bottom) 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* ============================================
   CAUSTIC LIGHT OVERLAY
   ============================================ */
.caustic-overlay {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}

.caustic-overlay::before,
.caustic-overlay::after {
  content: '';
  position: absolute;
  inset: -50%;
  background:
    radial-gradient(ellipse 120px 80px at 20% 30%, var(--caustic-1) 0%, transparent 70%),
    radial-gradient(ellipse 90px 140px at 60% 20%, var(--caustic-2) 0%, transparent 70%),
    radial-gradient(ellipse 150px 60px at 80% 60%, var(--caustic-1) 0%, transparent 70%),
    radial-gradient(ellipse 70px 100px at 30% 70%, var(--caustic-2) 0%, transparent 70%),
    radial-gradient(ellipse 110px 90px at 50% 50%, var(--caustic-1) 0%, transparent 70%),
    radial-gradient(ellipse 80px 120px at 10% 80%, var(--caustic-2) 0%, transparent 70%),
    radial-gradient(ellipse 130px 70px at 70% 40%, var(--caustic-1) 0%, transparent 70%),
    radial-gradient(ellipse 60px 110px at 90% 10%, var(--caustic-2) 0%, transparent 70%);
  animation: caustic-drift 18s ease-in-out infinite alternate;
}

.caustic-overlay::after {
  background:
    radial-gradient(ellipse 100px 60px at 40% 40%, var(--caustic-2) 0%, transparent 70%),
    radial-gradient(ellipse 80px 130px at 70% 70%, var(--caustic-1) 0%, transparent 70%),
    radial-gradient(ellipse 140px 80px at 15% 50%, var(--caustic-2) 0%, transparent 70%),
    radial-gradient(ellipse 60px 90px at 85% 30%, var(--caustic-1) 0%, transparent 70%),
    radial-gradient(ellipse 110px 100px at 55% 80%, var(--caustic-2) 0%, transparent 70%),
    radial-gradient(ellipse 90px 70px at 25% 15%, var(--caustic-1) 0%, transparent 70%);
  animation: caustic-drift-2 22s ease-in-out infinite alternate;
}

@keyframes caustic-drift {
  0% { transform: translate(0, 0) rotate(0deg) scale(1); }
  33% { transform: translate(30px, -20px) rotate(3deg) scale(1.05); }
  66% { transform: translate(-20px, 15px) rotate(-2deg) scale(0.97); }
  100% { transform: translate(10px, -10px) rotate(1deg) scale(1.02); }
}

@keyframes caustic-drift-2 {
  0% { transform: translate(0, 0) rotate(0deg) scale(1.02); }
  50% { transform: translate(-25px, 20px) rotate(-3deg) scale(0.98); }
  100% { transform: translate(15px, -15px) rotate(2deg) scale(1.04); }
}

/* ============================================
   HEADER TYPOGRAPHY
   ============================================ */
.page-header {
  position: relative;
  z-index: 10;
  text-align: center;
  padding: 3rem 1rem 1rem;
}

.page-header h1 {
  font-family: 'RL AQVA', 'Syne', sans-serif;
  font-size: clamp(3rem, 8vw, 6rem);
  font-weight: 900;
  letter-spacing: 0.15em;
  background: linear-gradient(135deg, var(--rosa-mexicano) 0%, var(--axo-gill-tip) 40%, var(--axo-body-main) 70%, var(--turquesa-caribe) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 2px 8px rgba(231, 42, 136, 0.2));
  line-height: 1.1;
}

.page-header .subtitle {
  font-family: 'Syne', sans-serif;
  font-size: clamp(0.9rem, 2.5vw, 1.3rem);
  font-weight: 600;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--axo-iris);
  opacity: 0.6;
  margin-top: 0.3rem;
}

/* ============================================
   SCENE CONTAINER
   ============================================ */
.scene-container {
  position: relative;
  z-index: 5;
  width: 100%;
  max-width: 700px;
  aspect-ratio: 1 / 1;
  margin: 0 auto;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.scene-container svg {
  width: 100%;
  height: 100%;
  overflow: visible;
}

/* ============================================
   AXOLOTL FLOATING BOB
   ============================================ */
.axolotl-group {
  animation: float-bob 4s ease-in-out infinite;
  transform-origin: center center;
}

@keyframes float-bob {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-8px); }
}

/* ============================================
   BREATHING ANIMATION
   ============================================ */
.axolotl-body-group {
  animation: breathe 3.5s ease-in-out infinite;
  transform-origin: center center;
}

@keyframes breathe {
  0%, 100% { transform: scaleX(1) scaleY(1); }
  50% { transform: scaleX(1.015) scaleY(1.01); }
}

/* ============================================
   GILL ANIMATIONS — 6 branches, each unique
   ============================================ */
.gill-branch-l1 { animation: gill-wave-1 3.2s ease-in-out infinite; transform-origin: right center; }
.gill-branch-l2 { animation: gill-wave-2 2.8s ease-in-out infinite 0.3s; transform-origin: right center; }
.gill-branch-l3 { animation: gill-wave-3 3.6s ease-in-out infinite 0.6s; transform-origin: right center; }
.gill-branch-r1 { animation: gill-wave-1r 3.0s ease-in-out infinite 0.15s; transform-origin: left center; }
.gill-branch-r2 { animation: gill-wave-2r 3.4s ease-in-out infinite 0.45s; transform-origin: left center; }
.gill-branch-r3 { animation: gill-wave-3r 2.9s ease-in-out infinite 0.75s; transform-origin: left center; }

@keyframes gill-wave-1 {
  0%, 100% { transform: rotate(0deg) translateX(0); }
  30% { transform: rotate(-4deg) translateX(-1px); }
  70% { transform: rotate(3deg) translateX(1px); }
}
@keyframes gill-wave-2 {
  0%, 100% { transform: rotate(0deg) translateY(0); }
  40% { transform: rotate(-5deg) translateY(-1.5px); }
  80% { transform: rotate(2deg) translateY(1px); }
}
@keyframes gill-wave-3 {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(4deg); }
  75% { transform: rotate(-3deg); }
}
@keyframes gill-wave-1r {
  0%, 100% { transform: rotate(0deg) translateX(0); }
  35% { transform: rotate(4deg) translateX(1px); }
  65% { transform: rotate(-3deg) translateX(-1px); }
}
@keyframes gill-wave-2r {
  0%, 100% { transform: rotate(0deg) translateY(0); }
  45% { transform: rotate(5deg) translateY(-1px); }
  85% { transform: rotate(-2deg) translateY(1.5px); }
}
@keyframes gill-wave-3r {
  0%, 100% { transform: rotate(0deg); }
  30% { transform: rotate(-4deg); }
  70% { transform: rotate(3deg); }
}

/* Feathery sub-branches */
.gill-feather {
  animation: feather-sway 2.5s ease-in-out infinite;
  transform-origin: bottom center;
}
.gill-feather:nth-child(2) { animation-delay: 0.2s; animation-duration: 2.8s; }
.gill-feather:nth-child(3) { animation-delay: 0.5s; animation-duration: 2.3s; }
.gill-feather:nth-child(4) { animation-delay: 0.7s; animation-duration: 3.0s; }

@keyframes feather-sway {
  0%, 100% { transform: rotate(0deg) scaleY(1); }
  50% { transform: rotate(3deg) scaleY(1.03); }
}

/* ============================================
   TAIL UNDULATION
   ============================================ */
.axolotl-tail {
  animation: tail-undulate 2.8s ease-in-out infinite;
  transform-origin: left center;
}

@keyframes tail-undulate {
  0%, 100% { transform: rotate(0deg) scaleX(1); }
  25% { transform: rotate(2deg) scaleX(1.01); }
  50% { transform: rotate(0deg) scaleX(0.99); }
  75% { transform: rotate(-2deg) scaleX(1.01); }
}

/* Tail fin ripple */
.tail-fin-edge {
  animation: fin-ripple 1.8s ease-in-out infinite;
  transform-origin: left center;
}

@keyframes fin-ripple {
  0%, 100% { transform: scaleY(1) translateY(0); }
  33% { transform: scaleY(1.06) translateY(-0.5px); }
  66% { transform: scaleY(0.95) translateY(0.5px); }
}

/* ============================================
   EYE BLINK
   ============================================ */
.eye-group {
  animation: eye-blink 5s ease-in-out infinite;
}

@keyframes eye-blink {
  0%, 42%, 46%, 100% { transform: scaleY(1); }
  44% { transform: scaleY(0.08); }
}

/* Eye follow — controlled by JS */
.eye-iris-group {
  transition: transform 0.15s ease-out;
}

/* ============================================
   SPARKLE CATCHLIGHTS
   ============================================ */
.eye-sparkle-star {
  animation: sparkle-rotate 4s linear infinite;
  transform-origin: center center;
}

.eye-sparkle-pulse {
  animation: sparkle-pulse 2s ease-in-out infinite;
}

@keyframes sparkle-rotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

@keyframes sparkle-pulse {
  0%, 100% { opacity: 0.8; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.2); }
}

/* ============================================
   BLUSH
   ============================================ */
.blush-circle {
  animation: blush-pulse 3s ease-in-out infinite;
}

@keyframes blush-pulse {
  0%, 100% { opacity: 0.35; }
  50% { opacity: 0.5; }
}

/* ============================================
   HAPPY WIGGLE (triggered by click)
   ============================================ */
.axolotl-group.wiggle {
  animation: happy-wiggle 0.6s ease-in-out;
}

@keyframes happy-wiggle {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  15% { transform: translateY(-5px) rotate(-3deg); }
  30% { transform: translateY(2px) rotate(3deg); }
  45% { transform: translateY(-3px) rotate(-2deg); }
  60% { transform: translateY(1px) rotate(2deg); }
  80% { transform: translateY(-1px) rotate(-1deg); }
}

/* ============================================
   SPEECH BUBBLE
   ============================================ */
.speech-bubble {
  position: absolute;
  bottom: calc(100% - 40px);
  left: 50%;
  transform: translateX(-50%) scale(0);
  background: white;
  border-radius: 18px;
  padding: 14px 20px;
  max-width: 280px;
  box-shadow: 0 4px 20px rgba(45, 27, 105, 0.12), 0 1px 4px rgba(0,0,0,0.06);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  color: var(--axo-iris);
  line-height: 1.5;
  z-index: 100;
  opacity: 0;
  transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.25s ease;
  pointer-events: none;
}

.speech-bubble.visible {
  transform: translateX(-50%) scale(1);
  opacity: 1;
}

.speech-bubble::after {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 0;
  border-left: 10px solid transparent;
  border-right: 10px solid transparent;
  border-top: 10px solid white;
}

.speech-bubble .fact-label {
  font-weight: 700;
  color: var(--rosa-mexicano);
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 4px;
  display: block;
}

/* ============================================
   AMBIENT PARTICLES — BUBBLES
   ============================================ */
.bubble-particle {
  position: fixed;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.7), rgba(173, 216, 255, 0.2));
  border: 1px solid rgba(255,255,255,0.3);
  pointer-events: none;
  z-index: 2;
  animation: bubble-rise linear infinite;
}

@keyframes bubble-rise {
  0% {
    transform: translateY(0) translateX(0) scale(1);
    opacity: 0;
  }
  10% { opacity: 0.7; }
  90% { opacity: 0.5; }
  100% {
    transform: translateY(-100vh) translateX(var(--drift)) scale(0.6);
    opacity: 0;
  }
}

/* ============================================
   AMBIENT PARTICLES — HEARTS
   ============================================ */
.heart-particle {
  position: fixed;
  pointer-events: none;
  z-index: 2;
  opacity: 0;
  animation: heart-float linear infinite;
  color: var(--axo-body-main);
  font-size: 14px;
}

@keyframes heart-float {
  0% {
    transform: translateY(0) translateX(0) scale(0.5) rotate(0deg);
    opacity: 0;
  }
  10% { opacity: 0.6; }
  50% { transform: translateY(-50vh) translateX(var(--drift)) scale(1) rotate(15deg); opacity: 0.4; }
  100% {
    transform: translateY(-100vh) translateX(calc(var(--drift) * 1.5)) scale(0.3) rotate(-10deg);
    opacity: 0;
  }
}

/* ============================================
   AZTEC PATTERN OVERLAY (on body)
   ============================================ */
.aztec-pattern {
  opacity: 0.1;
  mix-blend-mode: multiply;
}

/* ============================================
   WATER PLANT DECORATIONS
   ============================================ */
.water-plant {
  animation: plant-sway 5s ease-in-out infinite;
  transform-origin: bottom center;
}

.water-plant:nth-child(2) { animation-duration: 6s; animation-delay: 1s; }
.water-plant:nth-child(3) { animation-duration: 4.5s; animation-delay: 0.5s; }

@keyframes plant-sway {
  0%, 100% { transform: rotate(0deg); }
  50% { transform: rotate(3deg); }
}

/* ============================================
   FOOTER / BRAND
   ============================================ */
.brand-footer {
  position: relative;
  z-index: 10;
  text-align: center;
  padding: 1rem 1rem 2rem;
}

.brand-footer .brand-tag {
  font-family: 'RL AQVA', 'Syne', sans-serif;
  font-size: 0.9rem;
  letter-spacing: 0.3em;
  color: var(--rosa-mexicano);
  opacity: 0.5;
}

.brand-footer .render-info {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.75rem;
  color: var(--axo-iris);
  opacity: 0.3;
  margin-top: 0.3rem;
}

/* ============================================
   RESPONSIVE
   ============================================ */
@media (max-width: 600px) {
  .scene-container {
    max-width: 95vw;
  }
  .speech-bubble {
    max-width: 220px;
    font-size: 0.78rem;
    padding: 10px 14px;
  }
}

/* ============================================
   LIMB DETAIL — tiny fingers
   ============================================ */
.limb-finger {
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* ============================================
   ADDITIONAL GRADIENT SHADING
   ============================================ */
.body-3d-shadow {
  mix-blend-mode: multiply;
  opacity: 0.15;
}

.body-3d-highlight {
  mix-blend-mode: screen;
  opacity: 0.25;
}

/* ============================================
   SMILE ANIMATION
   ============================================ */
.mouth-smile {
  animation: smile-subtle 4s ease-in-out infinite;
}

@keyframes smile-subtle {
  0%, 100% { transform: scaleX(1); }
  50% { transform: scaleX(1.05); }
}

/* ============================================
   HOVER GLOW
   ============================================ */
.scene-container:hover .axolotl-glow {
  opacity: 0.3;
  transition: opacity 0.5s ease;
}

.axolotl-glow {
  opacity: 0;
  transition: opacity 0.5s ease;
}
</style>
</head>
<body>

<div class="caustic-overlay"></div>

<!-- HEADER -->
<header class="page-header">
  <h1>XOLOTL</h1>
  <p class="subtitle">Guardian del Agua</p>
</header>

<!-- SCENE -->
<div class="scene-container" id="sceneContainer">
  <div class="speech-bubble" id="speechBubble">
    <span class="fact-label">Dato Axolotl</span>
    <span id="factText"></span>
  </div>

  <svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Body gradient -->
      <radialGradient id="bodyGrad" cx="45%" cy="40%" r="55%">
        <stop offset="0%" stop-color="var(--axo-body-highlight)" />
        <stop offset="40%" stop-color="var(--axo-body-main)" />
        <stop offset="85%" stop-color="var(--axo-body-shadow)" />
        <stop offset="100%" stop-color="var(--axo-body-deep)" />
      </radialGradient>

      <!-- Belly gradient -->
      <radialGradient id="bellyGrad" cx="50%" cy="45%" r="50%">
        <stop offset="0%" stop-color="var(--axo-belly-light)" />
        <stop offset="100%" stop-color="var(--axo-belly)" />
      </radialGradient>

      <!-- Gill gradient left -->
      <linearGradient id="gillGradL" x1="100%" y1="0%" x2="0%" y2="50%">
        <stop offset="0%" stop-color="var(--axo-gill-soft)" />
        <stop offset="40%" stop-color="var(--axo-gill-base)" />
        <stop offset="100%" stop-color="var(--axo-gill-tip)" />
      </linearGradient>

      <!-- Gill gradient right -->
      <linearGradient id="gillGradR" x1="0%" y1="0%" x2="100%" y2="50%">
        <stop offset="0%" stop-color="var(--axo-gill-soft)" />
        <stop offset="40%" stop-color="var(--axo-gill-base)" />
        <stop offset="100%" stop-color="var(--axo-gill-tip)" />
      </linearGradient>

      <!-- Gill feather gradient -->
      <linearGradient id="gillFeatherGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="var(--axo-gill-base)" stop-opacity="0.8" />
        <stop offset="100%" stop-color="var(--axo-gill-tip)" stop-opacity="0.4" />
      </linearGradient>

      <!-- Eye iris gradient -->
      <radialGradient id="irisGrad" cx="40%" cy="35%" r="55%">
        <stop offset="0%" stop-color="var(--axo-iris-light)" />
        <stop offset="60%" stop-color="var(--axo-iris)" />
        <stop offset="100%" stop-color="var(--axo-pupil)" />
      </radialGradient>

      <!-- Tail fin gradient -->
      <linearGradient id="tailFinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="var(--axo-body-main)" stop-opacity="0.6" />
        <stop offset="100%" stop-color="var(--axo-body-shadow)" stop-opacity="0.3" />
      </linearGradient>

      <!-- Glow filter -->
      <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="8" result="blur" />
        <feMerge>
          <feMergeNode in="blur" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>

      <!-- Shadow filter -->
      <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="130%">
        <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(45,27,105,0.1)" />
      </filter>

      <!-- Blush filter -->
      <filter id="blushFilter">
        <feGaussianBlur stdDeviation="4" />
      </filter>

      <!-- Body highlight -->
      <radialGradient id="bodyHighlight" cx="35%" cy="30%" r="40%">
        <stop offset="0%" stop-color="white" stop-opacity="0.3" />
        <stop offset="100%" stop-color="white" stop-opacity="0" />
      </radialGradient>

      <!-- Water caustic pattern for background -->
      <pattern id="causticPattern" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
        <ellipse cx="30" cy="40" rx="25" ry="15" fill="rgba(173,216,255,0.08)" />
        <ellipse cx="90" cy="20" rx="20" ry="30" fill="rgba(200,180,255,0.06)" />
        <ellipse cx="60" cy="90" rx="30" ry="18" fill="rgba(173,216,255,0.07)" />
        <ellipse cx="100" cy="80" rx="15" ry="22" fill="rgba(200,180,255,0.05)" />
      </pattern>

      <!-- Aztec step pattern -->
      <pattern id="aztecSteps" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse" patternTransform="rotate(15)">
        <rect x="0" y="0" width="8" height="8" fill="var(--axo-pattern)" />
        <rect x="8" y="8" width="8" height="8" fill="var(--axo-pattern)" />
        <rect x="16" y="16" width="8" height="8" fill="var(--axo-pattern)" />
        <rect x="4" y="12" width="4" height="4" fill="var(--axo-pattern-strong)" />
        <rect x="16" y="4" width="4" height="4" fill="var(--axo-pattern-strong)" />
      </pattern>

      <clipPath id="bodyClip">
        <ellipse cx="250" cy="270" rx="75" ry="55" />
      </clipPath>
    </defs>

    <!-- Background caustic rect -->
    <rect width="500" height="500" fill="url(#causticPattern)" opacity="0.5">

<script>
(function() {
  'use strict';

  // =============================================
  // AXOLOTL FACTS
  // =============================================
  var facts = [
    'Los axolotes pueden regenerar extremidades, corazon, ojos e incluso partes del cerebro.',
    'Su nombre viene de Xolotl, el dios azteca gemelo de Quetzalcoatl, guardian del inframundo.',
    'Son neotenicas: conservan caracteristicas larvales toda su vida, como las branquias externas.',
    'Solo existen en estado silvestre en los canales de Xochimilco, Ciudad de Mexico.',
    'Un axolote adulto puede medir hasta 30 cm y vivir mas de 15 anos en cautiverio.',
    'Pueden regenerar la misma extremidad hasta 5 veces sin perder funcionalidad.',
    'Los aztecas los consideraban una delicadeza culinaria y tambien los usaban en medicina.',
    'Existen axolotes albinos, melanicos, dorados y hasta con patron mosaico.',
    'Su genoma es 10 veces mas grande que el humano: 32 mil millones de pares de bases.',
    'La palabra axolotl significa monstruo de agua en nahuatl.',
    'Estan en peligro critico de extincion desde 2006 segun la UICN.',
    'Respiran por branquias, pulmones y piel simultaneamente.'
  ];
  var factIndex = 0;

  // =============================================
  // DOM REFS
  // =============================================
  var scene = document.getElementById('sceneContainer');
  var axolotl = document.getElementById('axolotlGroup');
  var bubble = document.getElementById('speechBubble');
  var factText = document.getElementById('factText');
  var leftIris = document.getElementById('leftIris');
  var rightIris = document.getElementById('rightIris');

  // =============================================
  // CLICK -> WIGGLE + FACT
  // =============================================
  var bubbleTimeout = null;

  scene.addEventListener('click', function() {
    // Trigger wiggle
    axolotl.classList.remove('wiggle');
    void axolotl.offsetWidth; // force reflow
    axolotl.classList.add('wiggle');

    // Show fact
    factText.textContent = facts[factIndex];
    factIndex = (factIndex + 1) % facts.length;

    bubble.classList.add('visible');

    clearTimeout(bubbleTimeout);
    bubbleTimeout = setTimeout(function() {
      bubble.classList.remove('visible');
    }, 4500);
  });

  axolotl.addEventListener('animationend', function(e) {
    if (e.animationName === 'happy-wiggle') {
      axolotl.classList.remove('wiggle');
    }
  });

  // =============================================
  // EYES FOLLOW CURSOR / TOUCH
  // =============================================
  var eyeMaxOffset = 3.5;

  function getEyeOffset(eyeCenterX, eyeCenterY, pointerX, pointerY) {
    var svg = scene.querySelector('svg');
    var rect = svg.getBoundingClientRect();
    var svgX = (pointerX - rect.left) / rect.width * 500;
    var svgY = (pointerY - rect.top) / rect.height * 500;

    var dx = svgX - eyeCenterX;
    var dy = svgY - eyeCenterY;
    var dist = Math.sqrt(dx * dx + dy * dy);
    var maxDist = 200;
    var ratio = Math.min(dist / maxDist, 1);

    return {
      x: (dx / (dist || 1)) * eyeMaxOffset * ratio,
      y: (dy / (dist || 1)) * eyeMaxOffset * ratio
    };
  }

  function updateEyes(pointerX, pointerY) {
    var leftOffset = getEyeOffset(232, 230, pointerX, pointerY);
    var rightOffset = getEyeOffset(268, 230, pointerX, pointerY);

    leftIris.style.transform = 'translate(' + leftOffset.x + 'px, ' + leftOffset.y + 'px)';
    rightIris.style.transform = 'translate(' + rightOffset.x + 'px, ' + rightOffset.y + 'px)';
  }

  document.addEventListener('mousemove', function(e) {
    requestAnimationFrame(function() {
      updateEyes(e.clientX, e.clientY);
    });
  });

  document.addEventListener('touchmove', function(e) {
    var touch = e.touches[0];
    requestAnimationFrame(function() {
      updateEyes(touch.clientX, touch.clientY);
    });
  }, { passive: true });

  // =============================================
  // AMBIENT PARTICLES — BUBBLES + HEARTS (DOM)
  // =============================================
  function createBubble() {
    var el = document.createElement('div');
    el.className = 'bubble-particle';
    var size = 4 + Math.random() * 10;
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    el.style.left = (10 + Math.random() * 80) + 'vw';
    el.style.bottom = '-20px';
    el.style.setProperty('--drift', (Math.random() * 40 - 20) + 'px');
    el.style.animationDuration = (8 + Math.random() * 10) + 's';
    document.body.appendChild(el);
    setTimeout(function() { el.remove(); }, 18000);
  }

  function createHeart() {
    var el = document.createElement('div');
    el.className = 'heart-particle';
    el.textContent = '\u2665';
    el.style.left = (15 + Math.random() * 70) + 'vw';
    el.style.bottom = '-20px';
    el.style.fontSize = (10 + Math.random() * 8) + 'px';
    el.style.setProperty('--drift', (Math.random() * 60 - 30) + 'px');
    el.style.animationDuration = (10 + Math.random() * 8) + 's';
    document.body.appendChild(el);
    setTimeout(function() { el.remove(); }, 18000);
  }

  // Stagger initial particles
  for (var i = 0; i < 5; i++) {
    setTimeout(createBubble, i * 600);
  }
  setTimeout(createHeart, 2000);

  setInterval(createBubble, 3000);
  setInterval(createHeart, 6000);

})();
</script>
