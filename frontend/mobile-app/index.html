<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ffffff">
    <title>AXKAN Command</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="jaguar.png">
    <link rel="apple-touch-icon" href="jaguar.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="screen active">
        <div class="login-container">
            <div class="login-brand">
                <div class="login-jaguar-glow"></div>
                <img src="jaguar.png" alt="AXKAN" class="login-logo">
                <h1 class="login-title">COMMAND</h1>
                <p class="login-sub">Panel de Control Móvil</p>
            </div>
            <form id="login-form" class="login-form">
                <div class="input-group">
                    <label for="username">USUARIO</label>
                    <input type="text" id="username" name="username" autocomplete="username" required>
                    <div class="input-line"></div>
                </div>
                <div class="input-group">
                    <label for="password">CONTRASEÑA</label>
                    <input type="password" id="password" name="password" autocomplete="current-password" required>
                    <div class="input-line"></div>
                </div>
                <button type="submit" id="login-btn" class="btn-login">
                    <span class="btn-text">ACCEDER</span>
                    <span class="btn-loader"></span>
                </button>
                <p id="login-error" class="login-error"></p>
            </form>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app-screen" class="screen">
        <!-- STATUS BAR -->
        <header class="app-header">
            <div class="header-left">
                <img src="jaguar.png" alt="" class="header-logo">
                <span class="header-title">AXKAN</span>
            </div>
            <div class="header-right">
                <div id="connection-dot" class="connection-dot online"></div>
                <button id="refresh-btn" class="header-btn" aria-label="Refresh">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
                </button>
                <button id="logout-btn" class="header-btn" aria-label="Logout">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
        </header>

        <!-- CONTENT AREA -->
        <main id="content" class="content">

            <!-- HOME VIEW -->
            <div id="view-home" class="view active">
                <!-- Alerts Banner -->
                <div id="alerts-banner" class="alerts-banner hidden">
                    <div class="alert-pulse"></div>
                    <span id="alerts-text" class="alerts-text"></span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                </div>

                <!-- Stats Row -->
                <div class="stats-row">
                    <div class="stat-card" data-stat="pending">
                        <div class="stat-number" id="stat-pending">—</div>
                        <div class="stat-label">Pendientes</div>
                        <div class="stat-accent pending"></div>
                    </div>
                    <div class="stat-card" data-stat="progress">
                        <div class="stat-number" id="stat-progress">—</div>
                        <div class="stat-label">En Proceso</div>
                        <div class="stat-accent progress"></div>
                    </div>
                    <div class="stat-card" data-stat="completed">
                        <div class="stat-number" id="stat-completed">—</div>
                        <div class="stat-label">Completados</div>
                        <div class="stat-accent completed"></div>
                    </div>
                </div>

                <!-- Pipeline Bar -->
                <div class="section-block">
                    <h2 class="section-title">PIPELINE</h2>
                    <div id="pipeline-bar" class="pipeline-bar">
                        <div class="pipeline-empty">Cargando...</div>
                    </div>
                    <div id="pipeline-legend" class="pipeline-legend"></div>
                </div>

                <!-- Revenue Snapshot -->
                <div class="section-block">
                    <h2 class="section-title">REVENUE <span class="section-badge" id="revenue-period">HOY</span></h2>
                    <div class="revenue-grid">
                        <div class="revenue-card main">
                            <div class="revenue-amount" id="revenue-total">$0</div>
                            <div class="revenue-label">Ingresos</div>
                        </div>
                        <div class="revenue-card">
                            <div class="revenue-amount small" id="revenue-profit">$0</div>
                            <div class="revenue-label">Utilidad</div>
                        </div>
                        <div class="revenue-card">
                            <div class="revenue-amount small" id="revenue-orders">0</div>
                            <div class="revenue-label">Pedidos</div>
                        </div>
                    </div>
                </div>

                <!-- Recent Orders -->
                <div class="section-block">
                    <h2 class="section-title">RECIENTES</h2>
                    <div id="recent-orders" class="order-list">
                        <div class="skeleton-card"></div>
                        <div class="skeleton-card"></div>
                        <div class="skeleton-card"></div>
                    </div>
                </div>
            </div>

            <!-- ORDERS VIEW -->
            <div id="view-orders" class="view">
                <div class="filters-bar">
                    <div class="search-wrap">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="search" id="order-search" placeholder="Buscar pedido o cliente..." class="search-input">
                    </div>
                    <div id="status-filters" class="chip-row">
                        <button class="chip active" data-filter="all">Todos</button>
                        <button class="chip" data-filter="pending_review">Pendientes</button>
                        <button class="chip" data-filter="approved">Aprobados</button>
                        <button class="chip" data-filter="production">Producción</button>
                        <button class="chip" data-filter="shipped">Enviados</button>
                        <button class="chip" data-filter="delivered">Entregados</button>
                    </div>
                </div>
                <div id="orders-list" class="order-list">
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                </div>
                <div id="orders-empty" class="empty-state hidden">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                    <p>Sin pedidos</p>
                </div>
            </div>

            <!-- ORDER DETAIL SHEET -->
            <div id="order-detail" class="detail-sheet">
                <div class="detail-header">
                    <button id="detail-back" class="detail-back">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                        <span>Pedidos</span>
                    </button>
                    <span id="detail-order-num" class="detail-order-num"></span>
                </div>
                <div id="detail-content" class="detail-content"></div>
            </div>

            <!-- PIPELINE VIEW -->
            <div id="view-pipeline" class="view">
                <div class="section-block no-top">
                    <h2 class="section-title">STATUS PIPELINE</h2>
                    <div id="pipeline-columns" class="pipeline-columns"></div>
                </div>
                <div class="section-block">
                    <h2 class="section-title">POR DEPARTAMENTO</h2>
                    <div id="dept-breakdown" class="dept-breakdown"></div>
                </div>
            </div>

            <!-- TASKS VIEW -->
            <div id="view-tasks" class="view">
                <div class="filters-bar">
                    <div id="task-filters" class="chip-row">
                        <button class="chip active" data-filter="all">Todos</button>
                        <button class="chip" data-filter="pending">Pendiente</button>
                        <button class="chip" data-filter="in_progress">En Proceso</button>
                        <button class="chip" data-filter="completed">Completado</button>
                        <button class="chip" data-filter="blocked">Bloqueado</button>
                    </div>
                </div>
                <div id="task-stats" class="task-stats-row"></div>
                <div id="tasks-list" class="order-list"></div>
                <div id="tasks-empty" class="empty-state hidden">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="1.5"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                    <p>Sin tareas</p>
                </div>
            </div>

        </main>

        <!-- TAB BAR -->
        <nav class="tab-bar">
            <button class="tab active" data-view="home">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                <span>Home</span>
            </button>
            <button class="tab" data-view="orders">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
                <span>Pedidos</span>
            </button>
            <button class="tab" data-view="pipeline">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                <span>Pipeline</span>
            </button>
            <button class="tab" data-view="tasks">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
                <span>Tareas</span>
            </button>
        </nav>
    </div>

    <script src="app.js"></script>
</body>
</html>
