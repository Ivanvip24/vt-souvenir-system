<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXKAN — Mis Disenos</title>
<link rel="icon" type="image/png" href="../assets/images/LOGO-01.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
@font-face {
    font-family: 'RL AQVA';
    src: url('/fonts/rl-aqva-black.otf') format('opentype');
    font-weight: 900;
    font-style: normal;
    font-display: swap;
}

*, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --pink: #e72a88;
    --pink-dark: #c41d6f;
    --green: #8ab73b;
    --green-dark: #6d9a2a;
    --orange: #f39223;
    --turquoise: #09adc2;
    --red: #e52421;
    --oro: #D4A574;
    --gray-pending: #9ca3af;

    --topbar-h: 56px;
    --sidebar-w: 340px;

    --bubble-client: #f0f2f5;
    --bubble-designer: #fff0f6;
    --chat-bg: #eae6df;
    --input-bg: #f0f2f5;
}

html, body {
    height: 100%;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f9fafb;
    color: #111827;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

/* ============================================
   TOPBAR
   ============================================ */
.topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--topbar-h);
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 100;
    border-bottom: 3px solid var(--pink);
}

.topbar-left {
    display: flex;
    align-items: center;
    gap: 14px;
}

.topbar-logo {
    height: 30px;
    filter: brightness(0) invert(1);
}

.topbar-title {
    font-family: 'RL AQVA', 'Inter', sans-serif;
    font-size: 18px;
    color: #fff;
    letter-spacing: 1px;
}

.topbar-title span {
    color: var(--pink);
}

.topbar-right {
    display: flex;
    align-items: center;
    gap: 16px;
}

.designer-name {
    font-size: 13px;
    color: #ccc;
    font-weight: 500;
}

.btn-logout {
    background: none;
    border: 1px solid rgba(255,255,255,0.15);
    color: #999;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
}

.btn-logout:hover {
    color: #fff;
    border-color: var(--pink);
    background: rgba(231,42,136,0.1);
}

/* ============================================
   MAIN LAYOUT
   ============================================ */
.app {
    display: flex;
    height: calc(100vh - var(--topbar-h));
    margin-top: var(--topbar-h);
}

/* ============================================
   LEFT PANEL — ORDER LIST
   ============================================ */
.panel-left {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: #fff;
    border-right: 1px solid #e5e7eb;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.panel-left-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid #e5e7eb;
}

.panel-left-header h2 {
    font-size: 15px;
    font-weight: 700;
    color: #111827;
    margin-bottom: 10px;
}

.search-box {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    font-size: 13px;
    font-family: inherit;
    background: #f9fafb;
    transition: all 0.2s;
}

.search-box:focus {
    outline: none;
    border-color: var(--pink);
    box-shadow: 0 0 0 3px rgba(231,42,136,0.08);
    background: #fff;
}

.order-list {
    flex: 1;
    overflow-y: auto;
    overscroll-behavior: contain;
}

.order-list::-webkit-scrollbar {
    width: 5px;
}

.order-list::-webkit-scrollbar-track {
    background: transparent;
}

.order-list::-webkit-scrollbar-thumb {
    background: #d1d5db;
    border-radius: 3px;
}

.order-item {
    padding: 14px 20px;
    border-bottom: 1px solid #f3f4f6;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
}

.order-item:hover {
    background: #f9fafb;
}

.order-item.active {
    background: #fdf2f8;
    border-left: 3px solid var(--pink);
    padding-left: 17px;
}

.order-item-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 4px;
}

.order-client-name {
    font-size: 14px;
    font-weight: 600;
    color: #111827;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 180px;
}

.order-date {
    font-size: 11px;
    color: #9ca3af;
    white-space: nowrap;
}

.order-number {
    font-size: 12px;
    color: #6b7280;
    margin-bottom: 8px;
}

.order-pills {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
}

.design-pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    color: #fff;
    min-width: 28px;
    height: 20px;
    padding: 0 6px;
    border-radius: 10px;
    letter-spacing: 0.3px;
}

.design-pill[data-status="pendiente"] { background: var(--gray-pending); }
.design-pill[data-status="en_progreso"] { background: var(--orange); }
.design-pill[data-status="en_revision"] { background: var(--turquoise); }
.design-pill[data-status="cambios"] { background: var(--red); }
.design-pill[data-status="aprobado"] { background: var(--green); }

.unread-dot {
    position: absolute;
    top: 18px;
    right: 16px;
    width: 10px;
    height: 10px;
    background: var(--pink);
    border-radius: 50%;
    border: 2px solid #fff;
    display: none;
}

.order-item.has-unread .unread-dot {
    display: block;
}

.order-empty {
    padding: 40px 20px;
    text-align: center;
    color: #9ca3af;
    font-size: 14px;
}

.order-empty svg {
    display: block;
    margin: 0 auto 12px;
    opacity: 0.3;
}

/* ============================================
   RIGHT PANEL — CHAT VIEW
   ============================================ */
.panel-right {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--chat-bg);
    min-width: 0;
    position: relative;
}

/* Chat header */
.chat-header {
    background: #fff;
    padding: 10px 20px;
    border-bottom: 1px solid #e5e7eb;
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex-shrink: 0;
}

.chat-header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.chat-header-info {
    display: flex;
    align-items: center;
    gap: 12px;
}

.btn-back-mobile {
    display: none;
    background: none;
    border: none;
    color: var(--pink);
    cursor: pointer;
    padding: 4px;
}

.chat-client-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--pink), var(--pink-dark));
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-weight: 700;
    font-size: 16px;
    flex-shrink: 0;
}

.chat-client-details h3 {
    font-size: 14px;
    font-weight: 600;
    color: #111827;
}

.chat-client-details p {
    font-size: 11px;
    color: #9ca3af;
}

.chat-header-actions {
    display: flex;
    gap: 8px;
}

.btn-icon {
    background: none;
    border: 1px solid #e5e7eb;
    color: #6b7280;
    width: 34px;
    height: 34px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
}

.btn-icon:hover {
    border-color: var(--pink);
    color: var(--pink);
    background: rgba(231,42,136,0.04);
}

.btn-icon.active {
    background: var(--pink);
    border-color: var(--pink);
    color: #fff;
}

/* Design strip in header */
.chat-design-strip {
    display: flex;
    gap: 6px;
    align-items: center;
    padding: 4px 0;
}

.strip-pill {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.15s;
    border: 2px solid transparent;
    color: #fff;
}

.strip-pill[data-status="pendiente"] { background: var(--gray-pending); }
.strip-pill[data-status="en_progreso"] { background: var(--orange); }
.strip-pill[data-status="en_revision"] { background: var(--turquoise); }
.strip-pill[data-status="cambios"] { background: var(--red); }
.strip-pill[data-status="aprobado"] { background: var(--green); }

.strip-pill.selected {
    border-color: #111827;
    box-shadow: 0 0 0 2px rgba(0,0,0,0.1);
}

.strip-pill-icon {
    font-size: 10px;
}

/* Specs panel (collapsible) */
.specs-panel {
    background: #fff;
    border-bottom: 1px solid #e5e7eb;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
}

.specs-panel.open {
    max-height: 400px;
}

.specs-panel-inner {
    padding: 16px 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.spec-item label {
    display: block;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #9ca3af;
    margin-bottom: 2px;
}

.spec-item span {
    font-size: 13px;
    font-weight: 500;
    color: #111827;
}

.spec-item.full-width {
    grid-column: 1 / -1;
}

.status-select {
    padding: 6px 10px;
    border: 1px solid #e5e7eb;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    font-weight: 500;
    background: #fff;
}

.status-select:focus {
    outline: none;
    border-color: var(--pink);
}

/* ============================================
   CHAT MESSAGES AREA
   ============================================ */
.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 60px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    overscroll-behavior: contain;
    background: var(--chat-bg);
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d4cfc6' fill-opacity='0.15'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}

.chat-messages::-webkit-scrollbar {
    width: 6px;
}

.chat-messages::-webkit-scrollbar-track {
    background: transparent;
}

.chat-messages::-webkit-scrollbar-thumb {
    background: rgba(0,0,0,0.15);
    border-radius: 3px;
}

/* Date separator */
.date-separator {
    display: flex;
    justify-content: center;
    padding: 8px 0;
    margin: 8px 0;
}

.date-separator span {
    background: rgba(225,218,208,0.9);
    color: #54656f;
    font-size: 11px;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 8px;
    box-shadow: 0 1px 1px rgba(0,0,0,0.06);
}

/* Chat bubble */
.message-wrapper {
    display: flex;
    flex-direction: column;
    max-width: 65%;
    animation: fadeInMsg 0.2s ease;
}

@keyframes fadeInMsg {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
}

.message-wrapper.client {
    align-self: flex-start;
}

.message-wrapper.designer {
    align-self: flex-end;
}

.bubble {
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.45;
    position: relative;
    word-wrap: break-word;
    box-shadow: 0 1px 1px rgba(0,0,0,0.06);
}

.message-wrapper.client .bubble {
    background: #fff;
    border-top-left-radius: 0;
}

.message-wrapper.designer .bubble {
    background: var(--bubble-designer);
    border-top-right-radius: 0;
}

/* WhatsApp-style tail */
.message-wrapper.client .bubble::before {
    content: '';
    position: absolute;
    top: 0;
    left: -8px;
    width: 0;
    height: 0;
    border-top: 0 solid transparent;
    border-bottom: 10px solid transparent;
    border-right: 8px solid #fff;
}

.message-wrapper.designer .bubble::before {
    content: '';
    position: absolute;
    top: 0;
    right: -8px;
    width: 0;
    height: 0;
    border-top: 0 solid transparent;
    border-bottom: 10px solid transparent;
    border-left: 8px solid var(--bubble-designer);
}

.bubble-sender {
    font-size: 11px;
    font-weight: 600;
    color: var(--pink);
    margin-bottom: 2px;
}

.message-wrapper.designer .bubble-sender {
    color: var(--green-dark);
}

.bubble-text {
    white-space: pre-wrap;
}

.bubble-image {
    max-width: 280px;
    border-radius: 6px;
    cursor: pointer;
    display: block;
    margin: 4px 0;
    transition: opacity 0.15s;
}

.bubble-image:hover {
    opacity: 0.9;
}

.bubble-meta {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 4px;
    margin-top: 2px;
}

.bubble-time {
    font-size: 10px;
    color: #8696a0;
}

.bubble-design-tag {
    font-size: 9px;
    font-weight: 700;
    color: #fff;
    background: var(--turquoise);
    padding: 1px 5px;
    border-radius: 4px;
}

/* ============================================
   CHAT INPUT AREA
   ============================================ */
.chat-input-area {
    background: #f0f2f5;
    padding: 10px 16px;
    display: flex;
    align-items: flex-end;
    gap: 10px;
    flex-shrink: 0;
}

.btn-attach {
    background: none;
    border: none;
    color: #54656f;
    cursor: pointer;
    padding: 8px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
}

.btn-attach:hover {
    background: rgba(0,0,0,0.06);
    color: var(--pink);
}

.input-wrapper {
    flex: 1;
    display: flex;
    align-items: flex-end;
    background: #fff;
    border-radius: 10px;
    padding: 6px 12px;
    gap: 8px;
    box-shadow: 0 1px 1px rgba(0,0,0,0.04);
}

.chat-textarea {
    flex: 1;
    border: none;
    outline: none;
    font-size: 14px;
    font-family: inherit;
    line-height: 1.4;
    resize: none;
    max-height: 120px;
    min-height: 24px;
    height: 24px;
    color: #111827;
    background: transparent;
}

.chat-textarea::placeholder {
    color: #9ca3af;
}

.design-tag-select {
    flex-shrink: 0;
    padding: 3px 6px;
    border: 1px solid #e5e7eb;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    background: #f9fafb;
    color: #6b7280;
    align-self: center;
}

.design-tag-select:focus {
    outline: none;
    border-color: var(--turquoise);
}

.btn-send {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--green);
    border: none;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
}

.btn-send:hover {
    background: var(--green-dark);
    transform: scale(1.05);
}

.btn-send:active {
    transform: scale(0.95);
}

.btn-send:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
}

/* ============================================
   EMPTY STATE
   ============================================ */
.empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #9ca3af;
    gap: 12px;
    background: var(--chat-bg);
}

.empty-state svg {
    opacity: 0.2;
}

.empty-state p {
    font-size: 15px;
    font-weight: 500;
}

.empty-state small {
    font-size: 12px;
    color: #b0b7c0;
}

/* ============================================
   IMAGE LIGHTBOX
   ============================================ */
.lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
}

.lightbox.open {
    opacity: 1;
    pointer-events: auto;
}

.lightbox img {
    max-width: 90vw;
    max-height: 90vh;
    object-fit: contain;
    border-radius: 4px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
}

.lightbox-close {
    position: absolute;
    top: 20px;
    right: 24px;
    background: rgba(255,255,255,0.15);
    border: none;
    color: #fff;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
}

.lightbox-close:hover {
    background: rgba(255,255,255,0.3);
}

/* ============================================
   LOADING
   ============================================ */
.loading-spinner {
    display: flex;
    justify-content: center;
    padding: 40px;
}

.spinner {
    width: 28px;
    height: 28px;
    border: 3px solid #e5e7eb;
    border-top-color: var(--pink);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* ============================================
   FILE UPLOAD PREVIEW
   ============================================ */
.upload-preview {
    display: none;
    padding: 8px 16px 0;
    background: #f0f2f5;
}

.upload-preview.show {
    display: block;
}

.upload-preview-inner {
    background: #fff;
    border-radius: 8px;
    padding: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.upload-preview img {
    width: 60px;
    height: 60px;
    object-fit: cover;
    border-radius: 6px;
}

.upload-preview-name {
    flex: 1;
    font-size: 12px;
    color: #6b7280;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.btn-remove-upload {
    background: none;
    border: none;
    color: #9ca3af;
    cursor: pointer;
    font-size: 18px;
    padding: 4px;
}

.btn-remove-upload:hover {
    color: var(--red);
}

/* ============================================
   MOBILE RESPONSIVE
   ============================================ */
@media (max-width: 768px) {
    :root {
        --sidebar-w: 100%;
    }

    .app {
        position: relative;
    }

    .panel-left {
        width: 100%;
        position: absolute;
        inset: 0;
        z-index: 10;
        transition: transform 0.25s ease;
    }

    .panel-left.hidden-mobile {
        transform: translateX(-100%);
        pointer-events: none;
    }

    .panel-right {
        width: 100%;
        position: absolute;
        inset: 0;
        z-index: 5;
    }

    .btn-back-mobile {
        display: flex;
    }

    .chat-messages {
        padding: 12px 16px;
    }

    .message-wrapper {
        max-width: 85%;
    }

    .chat-header-actions .btn-specs-label {
        display: none;
    }
}

@media (max-width: 480px) {
    .topbar-title {
        font-size: 15px;
    }

    .designer-name {
        display: none;
    }
}
</style>
</head>
<body>

<script>
// Hide topbar when embedded in iframe
if (window.location.search.includes('embedded=1')) {
    document.documentElement.style.setProperty('--topbar-h', '0px');
    document.addEventListener('DOMContentLoaded', function() {
        var tb = document.querySelector('.topbar');
        if (tb) tb.style.display = 'none';
    });
}
</script>

<!-- TOPBAR -->
<header class="topbar">
    <div class="topbar-left">
        <img src="../assets/images/LOGO-03.png" alt="AXKAN" class="topbar-logo">
        <div class="topbar-title">Portal <span>Diseno</span></div>
    </div>
    <div class="topbar-right">
        <span class="designer-name" id="designer-name"></span>
        <button class="btn-logout" id="logout-btn">Salir</button>
    </div>
</header>

<!-- MAIN APP -->
<div class="app">

    <!-- LEFT PANEL: ORDER LIST -->
    <div class="panel-left" id="panel-left">
        <div class="panel-left-header">
            <h2>Mis Pedidos</h2>
            <input type="text" class="search-box" id="search-box" placeholder="Buscar cliente o pedido...">
        </div>
        <div class="order-list" id="order-list">
            <div class="loading-spinner"><div class="spinner"></div></div>
        </div>
    </div>

    <!-- RIGHT PANEL: CHAT OR EMPTY STATE -->
    <div class="panel-right" id="panel-right">

        <!-- Empty state (shown when no order selected) -->
        <div class="empty-state" id="empty-state">
            <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            <p>Selecciona un pedido para ver el chat</p>
            <small>Los mensajes del cliente aparecen aqui</small>
        </div>

        <!-- Chat view (hidden until order selected) -->
        <div class="chat-view" id="chat-view" style="display:none; flex-direction:column; height:100%;">

            <!-- Chat header -->
            <div class="chat-header">
                <div class="chat-header-top">
                    <div class="chat-header-info">
                        <button class="btn-back-mobile" id="btn-back" title="Volver">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
                        </button>
                        <div class="chat-client-avatar" id="chat-avatar">C</div>
                        <div class="chat-client-details">
                            <h3 id="chat-client-name">Cliente</h3>
                            <p id="chat-client-sub">Pedido #0000</p>
                        </div>
                    </div>
                    <div class="chat-header-actions">
                        <button class="btn-icon" id="btn-specs" title="Ver especificaciones">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                        </button>
                    </div>
                </div>
                <div class="chat-design-strip" id="chat-design-strip"></div>
            </div>

            <!-- Specs panel (collapsible) -->
            <div class="specs-panel" id="specs-panel">
                <div class="specs-panel-inner" id="specs-content"></div>
            </div>

            <!-- Messages -->
            <div class="chat-messages" id="chat-messages">
                <div class="loading-spinner"><div class="spinner"></div></div>
            </div>

            <!-- Upload preview -->
            <div class="upload-preview" id="upload-preview">
                <div class="upload-preview-inner">
                    <img id="upload-thumb" src="" alt="preview">
                    <span class="upload-preview-name" id="upload-name"></span>
                    <button class="btn-remove-upload" id="btn-remove-upload">&times;</button>
                </div>
            </div>

            <!-- Input bar -->
            <div class="chat-input-area">
                <button class="btn-attach" id="btn-attach" title="Adjuntar imagen">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                </button>
                <input type="file" id="file-input" accept="*/*" style="display:none">
                <div class="input-wrapper">
                    <textarea class="chat-textarea" id="chat-input" placeholder="Escribe un mensaje..." rows="1"></textarea>
                    <select class="design-tag-select" id="design-tag-select" title="Aplica a diseno">
                        <option value="">Todos</option>
                    </select>
                </div>
                <button class="btn-send" id="btn-send" title="Enviar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- IMAGE LIGHTBOX -->
<div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightbox-close">&times;</button>
    <img id="lightbox-img" src="" alt="Imagen ampliada">
</div>

<script src="designs.js"></script>
</body>
</html>
